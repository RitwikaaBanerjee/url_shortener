<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - URL Management</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 3rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
        h1 { color: #ef4444; margin-top: 0; }
        p { color: #4b5563; margin-bottom: 2rem; }
        a { display: inline-block; background: #4f46e5; color: white; padding: 0.75rem 1.5rem; text-decoration: none; border-radius: 8px; font-weight: 600; }
        a:hover { background: #4338ca; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Link Unavailable</h1>
        <p>{{ message }}</p>
        <a href="/">Go to Dashboard</a>
    </div>
</body>
</html>
