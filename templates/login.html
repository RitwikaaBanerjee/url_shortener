<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - URL Platform</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #fff;
            --text-main: #111827;
            --border-color: #e5e7eb;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 { margin-top: 0; text-align: center; color: var(--primary-color); }
        input {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        button:hover { background-color: var(--primary-hover); }
        .toggle-btn { background-color: white; color: var(--primary-color); border: 1px solid var(--primary-color); }
        .toggle-btn:hover { background-color: #f0fdf4; }
        .alert { padding: 1rem; border-radius: 8px; margin-bottom: 1rem; color: #b91c1c; background: #fee2e2; }
    </style>
</head>
<body>
    <div class="card" id="login-form">
        <h2>Login</h2>
        {% if error %}<div class="alert">{{ error }}</div>{% endif %}
        {% if message %}<div class="alert" style="color: #047857; background: #d1fae5;">{{ message }}</div>{% endif %}
        <form action="/login" method="post">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>
        <button class="toggle-btn" onclick="toggleForms()">Need an account? Register</button>
    </div>

    <div class="card" id="register-form" style="display: none;">
        <h2>Register</h2>
        <form action="/register" method="post">
            <input type="text" name="username" placeholder="Choose a Username" required>
            <input type="password" name="password" placeholder="Choose a Password" required>
            <button type="submit">Create Account</button>
        </form>
        <button class="toggle-btn" onclick="toggleForms()">Already have an account? Login</button>
    </div>

    <script>
        function toggleForms() {
            var login = document.getElementById('login-form');
            var register = document.getElementById('register-form');
            if (login.style.display === 'none') {
                login.style.display = 'block';
                register.style.display = 'none';
            } else {
                login.style.display = 'none';
                register.style.display = 'block';
            }
        }
    </script>
</body>
</html>
